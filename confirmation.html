<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bluebells | Order Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="confirmation.css">
</head>

<body>

<section class="confirmation-page">

  <div class="confirmation-card">

    <div class="success-icon">✓</div>

    <h1>Thank You for Your Order!</h1>
    <p class="subtitle">Your order has been placed successfully 🎉</p>

    <div class="order-info">

      <div class="info-box">
        <span>👤 Name</span>
        <p id="c-name"></p>
      </div>

      <div class="info-box">
        <span>📞 Phone</span>
        <p id="c-phone"></p>
      </div>

      <div class="info-box">
        <span>📍 Address</span>
        <p id="c-address"></p>
      </div>

      <div class="info-box total">
        <span>💰 Total</span>
        <p id="c-total"></p>
      </div>

    </div>

    <div class="products">
      <h3>🛍 Ordered Items</h3>
      <ul id="c-products"></ul>
    </div>

    <div class="actions">
      <a id="repeatOrderBtn" href="#" class="btn outline">Repeat Order</a>
      <a href="shop.html" class="btn outline">Continue Shopping</a>
      <a href="index.html" class="btn">Back to Home</a>
    </div>

    <p class="note">
      A confirmation message will be sent to your phone 📩
    </p>

  </div>

</section>

<script src="confirmation-api.js"></script>
</body>
</html>
