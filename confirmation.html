<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmed | Bluebells</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="confirmation.css">
</head>

<body>

<section class="confirmation-page">

  <div class="confirmation-card">

    <div class="success-icon">✓</div>

    <h1>Thank You for Your Order!</h1>
    <p>Your order has been placed successfully 🎉</p>

    <!-- CUSTOMER INFO -->
    <div class="order-info">

      <div class="info-box">
        <span>👤 Name</span>
        <p id="c-name"></p>
      </div>

      <div class="info-box">
        <span>📞 Phone</span>
        <p id="c-phone"></p>
      </div>

      <div class="info-box">
        <span>📍 Address</span>
        <p id="c-address"></p>
      </div>

      <div class="info-box total">
        <span>💰 Total</span>
        <p id="c-total"></p>
      </div>

    </div>

    <!-- PRODUCTS -->
    <div class="products">
      <h3>🛍 Ordered Items</h3>
      <ul id="c-products"></ul>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <a id="repeatOrderBtn" href="#" class="btn">Repeat Order</a>
      <a href="shop.html" class="btn outline">Continue Shopping</a>
    </div>

  </div>

</section>

<script src="confirmation-api.js"></script>
</body>
</html>
