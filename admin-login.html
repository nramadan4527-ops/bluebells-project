<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Bluebells</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .error-msg { color: #dc2626; font-size: 14px; margin-top: 10px; }
    .success-msg { color: #16a34a; font-size: 14px; margin-top: 10px; }
    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>
  <div class="logo">
  <img src="img/logo.png" alt="Bluebells Logo">
</div>

<section class="login">

  <form id="loginForm" class="login-card">

    <!-- Admin Icon -->
    <div class="admin-icon">
      <i class="fas fa-user-shield"></i>
    </div>

    <!-- Header -->
    <div class="login-header">
      <h1>Admin Login</h1>
      <p>Secure access to Bluebells dashboard</p>
    </div>

    <!-- Inputs -->
    <div class="login-body">
      <div class="input-group">
        <input type="text" id="username" placeholder="Username" required>
        <i class="fas fa-user"></i>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required>
        <i class="fas fa-eye" id="togglePassword"></i>
      </div>
    </div>

    <!-- Options -->
    <div class="login-options">
      <label>
        <input type="checkbox"> Remember me
      </label>
      <a href="#">Forgot password?</a>
    </div>

    <!-- Button -->
    <button type="submit">Login</button>

    <!-- Messages -->
    <p id="error" class="error-msg"></p>
    <p id="success" class="success-msg"></p>

    <!-- Footer -->
    <div class="login-footer">
      © 2026 Bluebells System
    </div>

  </form>

</section>

<script src="api.js"></script>
<script src="auth-manager.js"></script>

<script>
  const toggle = document.getElementById("togglePassword");
  const password = document.getElementById("password");

  toggle.addEventListener("click", () => {
    const type = password.type === "password" ? "text" : "password";
    password.type = type;
    toggle.classList.toggle("fa-eye-slash");
  });

  document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const passwordValue = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("error");
    const successMsg = document.getElementById("success");
    const btn = this.querySelector("button");

    errorMsg.innerText = "";
    successMsg.innerText = "";

    if (!username || !passwordValue) {
      errorMsg.innerText = "Please enter username and password ❌";
      return;
    }

    btn.classList.add("loading");
    btn.innerText = "Logging in...";

    try {
      const result = await Auth.login(username, passwordValue);

      if (!result.success) {
        throw new Error(result.error);
      }

      // Ensure token is available and redirect with token in URL so admin page can pick it up immediately
      const token = Auth.getToken();
      successMsg.innerText = "Login successful! Redirecting... ✅";
      setTimeout(() => {
        if (token) {
          window.location.replace(`admin.html?token=${encodeURIComponent(token)}`);
        } else {
          window.location.replace('admin.html');
        }
      }, 500);

    } catch (err) {
      console.error(err);
      errorMsg.innerText = err.message || "Login failed ❌";
    } finally {
      btn.classList.remove("loading");
      btn.innerText = "Login";
    }
  });
</script>

</body>
</html>
