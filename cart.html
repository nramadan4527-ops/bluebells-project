<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart | Bluebells</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Cart Style -->
  <link rel="stylesheet" href="cart.css">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">
  <div class="logo">
    <img src="img/logo.png" alt="Bluebells Logo">
  </div>

  <nav>
    <a href="shop.html">Shop</a>
    <a href="cart.html" class="active">
      Cart <span id="cart-count">0</span>
    </a>
  </nav>
</header>

<!-- ===== CART PAGE ===== -->
<div class="container">

  <div class="cart-box">
    <h1>Your Cart 🛒</h1>

    <!-- CART ITEMS -->
    <div id="cartItems"></div>

    <!-- TOTAL -->
    <div class="summary">
      <span>Total</span>
      <strong id="cartTotal">0 EGP</strong>
    </div>

    <!-- CHECKOUT -->
    <button class="checkout-btn" onclick="checkout()">
      Checkout
    </button>
  </div>

</div>

<!-- ===== SCRIPT ===== -->
<script src="cart.js"></script>

</body>
</html>
