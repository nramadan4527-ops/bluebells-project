<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="cart.css">
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="img/logo.png" alt="logo">
    <span>Bluebells</span>
  </div>

  <nav>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart <span id="cart-count">0</span></a>
  </nav>
</header>

<section class="container">

  <div class="form">
    <input id="c-name-input" placeholder="Name">
    <input id="c-phone-input" placeholder="Phone">
    <input id="c-address-input" placeholder="Address">
  </div>

  <div id="cartItems"></div>

 <div class="summary">
  <p>Subtotal: <span id="subtotal">0</span></p>
  <p>Total: <span id="cartTotal">0</span></p>

  <a href="confirmation.html" class="btn">Checkout</a>
</div>

</section>

<script src="cart.js"></script>
</body>
</html>
