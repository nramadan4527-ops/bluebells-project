<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart | Bluebells</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="cart.css">
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="img/logo.png" alt="Bluebells">
  </div>

  <nav>
    <a href="shop.html">Shop</a>
    <a class="active">Cart <span id="cart-count">0</span></a>
  </nav>
</header>

<section class="cart-page">

  <!-- CART ITEMS -->
  <div class="cart-items" id="cartItems"></div>
<div id="cartTotal" class="cart-total"></div>
  <!-- SUMMARY -->
  <div class="cart-summary">

    <h3>Order Summary</h3>

    <div class="summary-row">
      <span>Subtotal</span>
      <span id="subtotal">0 EGP</span>
    </div>

    <div class="summary-row total">
      <span>Total</span>
      <span id="cartTotal">0 EGP</span>
    </div>

    <div class="form">
      <input id="c-name-input" placeholder="Full Name">
      <input id="c-phone-input" placeholder="Phone Number">
      <input id="c-address-input" placeholder="Address">
    </div>

    <button onclick="checkout()">Checkout 💙</button>

  </div>

</section>

<script src="cart.js"></script>
<div id="cartItems"></div>

<span id="subtotal">0</span>
<span id="cartTotal">0</span>
<span id="cart-count">0</span>
</body>
</html>
