<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="cart.css">
</head>
<body>

<div class="cart-page">

  <h1>Your Cart</h1>

  <!-- Cart Items -->
  <div id="cartItems"></div>

  <!-- Total -->
  <h3>Total: <span id="totalPrice">0</span> EGP</h3>

  <!-- Customer Info -->
  <div class="customer-info">
  <h2>Customer Information</h2>

  <div class="form-group">
    <label for="custName">Full Name</label>
    <input type="text" id="custName" placeholder="Enter your name">
  </div>

  <div class="form-group">
    <label for="custPhone">Phone Number</label>
    <input type="text" id="custPhone" placeholder="01XXXXXXXXX">
  </div>

  <div class="form-group">
    <label for="custAddress">Address</label>
    <input type="text" id="custAddress" placeholder="Street, City, Area">
  </div>


  <!-- Checkout -->
  <button class="checkout-btn" onclick="checkout()">
    Checkout
  </button>

</div>

<script src="cart.js"></script>
</body>
</html>
