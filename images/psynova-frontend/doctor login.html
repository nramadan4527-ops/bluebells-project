<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Login</title>
  <link rel="stylesheet" href="doctor login.css">
</head>
<body>

<div class="container">

  <div class="logo">PSYNOVA</div>

  <h2>Doctor Login</h2>
  <p class="subtitle">Access your professional dashboard</p>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email Address" required>
    
    <div class="password-box">
      <input type="password" id="password" placeholder="Password" required>
      <span onclick="togglePassword()">👁</span>
    </div>

    <div class="options">
      <a href="#">Forgot Password?</a>
    </div>

    <button type="submit">Login</button>
  </form>

  <div class="divider">or</div>

  <button class="google-btn">Login with Google</button>

</div>

<footer>
  <p>© 2026 Psynova Health. All services are encrypted and confidential.</p>
  <div>
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Service</a>
    <a href="#">Support</a>
  </div>
</footer>

<script src="doctor login.js"></script>
</body>
</html>
