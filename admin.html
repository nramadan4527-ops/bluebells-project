<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin">

  <aside class="sidebar">
    <h2>ADMIN</h2>
    <p>Products</p>
    <p>Orders</p>
  </aside>

  <main class="content">

    <!-- ADD PRODUCT -->
    <section class="box">
      <h3>Add Product</h3>

      <div class="form">

        <input id="name" type="text" placeholder="Product Name">
        <input id="price" type="number" placeholder="Price">

        <input id="image" type="file" accept="image/*">

        <img id="preview">

        <!-- مهم: type=button -->
        <button type="button" onclick="addProduct()">Add Product</button>

      </div>
    </section>

    <!-- PRODUCTS -->
    <section class="box">
      <h3>Products</h3>
      <div id="adminProducts" class="products"></div>
    </section>
<section class="box">
  <h3>Orders</h3>
  <div id="adminOrders"></div>
</section>
  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
