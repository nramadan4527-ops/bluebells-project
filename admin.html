<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin">

  <aside class="sidebar">
    <h2>ADMIN</h2>
    <span>Products</span>
    <span>Orders</span>
  </aside>

  <main class="content">

    <!-- Add Product -->
    <section class="box">
      <h3>Add Product</h3>

      <div class="form">
        <input id="name" placeholder="Product name">
        <input id="price" type="number" placeholder="Price">

        <label class="upload">
          Choose Image
          <input type="file" id="image" accept="image/*">
        </label>

        <img id="preview" class="preview" />

        <button onclick="addProduct()">Add Product</button>
      </div>
    </section>

    <!-- Products -->
    <section class="box">
      <h3>Products</h3>
      <div class="products" id="adminProducts"></div>
    </section>

  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
