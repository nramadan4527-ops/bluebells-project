<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="admin.css">

  <!-- Auth Token Handler -->
  <script>
    (function() {
      try {
        const params = new URLSearchParams(window.location.search);
        const t = params.get('token');

        if (t) {
          localStorage.setItem('authToken', t);

          params.delete('token');
          const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
          history.replaceState({}, document.title, newUrl);
        }
      } catch (e) {
        console.error(e);
      }
    })();
  </script>
</head>

<body>

<div class="admin-container">

  <!-- ===== HEADER ===== -->
  <div class="confirmation-card">

    <div class="success-icon">✓</div>

    <h1>Admin Dashboard</h1>
    <p class="subtitle">Manage products & orders</p>

    <!-- ===== PRODUCT FORM ===== -->
    <div class="admin-panel">

      <h2>➕ Add / Edit Product</h2>

      <input type="text" id="productName" placeholder="Product Name">
      <input type="number" id="productPrice" placeholder="Product Price">
      <textarea id="productDesc" placeholder="Product Description"></textarea>

      <input type="file" id="productImage" accept="image/*" onchange="previewImage(event)">

      <div class="image-preview">
        <img id="preview" src="">
      </div>

      <button class="btn" onclick="addProduct()">Save Product</button>
    </div>

    <!-- ===== PRODUCTS LIST ===== -->
    <div class="products">
      <h3>🛍 Products List</h3>
      <ul id="productList"></ul>
    </div>

    <!-- ===== ORDERS DASHBOARD (NEW) ===== -->
    <div class="orders-section">

      <h3>📊 Orders Dashboard</h3>

      <div id="ordersList"></div>

    </div>

    <p class="note">Everything is saved in localStorage</p>

  </div>

</div>

<!-- ===== SCRIPTS ===== -->
<script src="api.js"></script>
<script src="auth-manager.js"></script>

<!-- Products -->
<script src="product-api.js"></script>
<script src="admin-api.js"></script>

<!-- Orders -->
<script src="orders.js"></script>

</body>
</html>
