<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>ADMIN</h2>
    <p>Dashboard</p>
    <p>Products</p>
    <p>Orders</p>
  </aside>

  <!-- Content -->
  <main class="content">

    <!-- Add Product -->
    <section class="box">
      <h3>Add Product</h3>
      <div class="form">
        <input id="name" placeholder="Product name">
        <input id="price" type="number" placeholder="Price">
        <input id="image" placeholder="Image URL">
        <button onclick="addProduct()">Add Product</button>
      </div>
    </section>

    <!-- Products -->
    <section class="box">
      <h3>Products</h3>
      <div class="products" id="products"></div>
    </section>

    <!-- Orders -->
    <section class="box">
      <h3>Orders</h3>
      <div class="orders" id="orders"></div>
    </section>

  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
