version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bluebells-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123

  backend:
    build: ./backend
    container_name: bluebells-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/bluebells?authSource=admin
      JWT_SECRET: bluebells_secret_key_2026
      NODE_ENV: production
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

volumes:
  mongodb_data:
