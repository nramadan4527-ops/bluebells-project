<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bluebells | Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="shop.css">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">
  <div class="logo-box">
    <img src="img/logo.png" alt="Bluebells Logo" class="logo-img">
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html" class="active">Shop</a>
    <a href="cart.html">Cart <span id="cart-count">0</span></a>
    <a href="login.html">Login</a>
  </nav>
</header>

<!-- ===== SHOP HERO ===== -->
<section class="shop-hero">
  <h1>Our Collection</h1>
  <p>Elegant accessories designed to shine with you</p>
</section>

<!-- ===== PRODUCTS ===== -->
<section class="products">

  <div class="product-card">
    <img src="img/product1.jpg" alt="Product">
    <h3>Golden Necklace</h3>
    <p>Soft elegant design</p>
    <span>$25</span>
    <button>Add to Cart</button>
  </div>

  <div class="product-card">
    <img src="img/product2.jpg" alt="Product">
    <h3>Luxury Ring</h3>
    <p>Minimal & classy</p>
    <span>$18</span>
    <button>Add to Cart</button>
  </div>

  <div class="product-card">
    <img src="img/product3.jpg" alt="Product">
    <h3>Charm Bracelet</h3>
    <p>Handmade with love</p>
    <span>$22</span>
    <button>Add to Cart</button>
  </div>

</section>

<!-- ===== FOOTER ===== -->
<footer>
  © 2026 Bluebells. All rights reserved.
</footer>

</body>
</html>
