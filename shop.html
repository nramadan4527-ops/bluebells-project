<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bluebells | Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="shop.css">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">
  <div class="logo-box">
    <img src="img/logo.png" alt="Bluebells Logo" class="logo-img">
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html" class="active">Shop</a>
    <a href="cart.html">🛒 Cart <span id="cart-count">0</span></a>
    <a href="login.html">Login</a>
  </nav>
</header>

<!-- ===== HERO ===== -->
<section class="shop-hero">
  <h1>Discover Elegant Accessories ✨</h1>
  <p>Minimal • Modern • Handmade pieces just for you</p>
</section>

<!-- ===== SEARCH ===== -->
<section class="shop-search">
  <input 
    type="text" 
    id="search" 
    placeholder="Search products... 🔍"
  />
</section>

<!-- ===== PRODUCTS GRID ===== -->
<section class="products">
  <div id="productsGrid"></div>
</section>

<!-- ===== EMPTY MESSAGE ===== -->
<p id="empty" style="text-align:center; display:none;">
  No products found 😢
</p>

<footer>
  © 2026 Bluebells. All rights reserved.
</footer>

<script src="shop.js"></script>
</body>
</html>
